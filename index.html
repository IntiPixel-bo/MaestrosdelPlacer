<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Maestros del Placer</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        .glass { background: rgba(15, 23, 42, 0.9); backdrop-filter: blur(16px); }
        .hidden { display: none !important; }
        .flex-modal { display: flex !important; }
    </style>
</head>
<body class="bg-slate-950 text-slate-200">

    <nav class="fixed top-0 w-full z-50 glass border-b border-slate-800">
        <div class="flex justify-between items-center p-4 max-w-6xl mx-auto">
            <div class="flex items-center gap-3">
                <img src="logomp.png" class="h-10 w-10 rounded-full border border-purple-500">
                <span class="text-xl font-bold text-purple-400">Maestros del Placer</span>
            </div>
            <button type="button" onclick="toggleModal('auth-modal')" class="bg-slate-800 px-6 py-2 rounded-full text-sm font-semibold">
                Entrar
            </button>
        </div>
    </nav>

    <section class="pt-32 pb-24 px-6">
        <div id="chat-container" class="max-w-3xl mx-auto bg-slate-900 rounded-2xl border border-slate-800 h-[500px] flex flex-col overflow-hidden">
            <div id="chat-box" class="flex-1 overflow-y-auto p-6 space-y-4">
                <div class="bg-slate-800 p-4 rounded-xl max-w-[80%] text-sm">
                    Hola. Soy tu experto de **Maestros del Placer**. ¿En qué puedo ayudarte hoy?
                </div>
            </div>
            
            <div id="typing" class="hidden px-6 py-2 text-xs text-slate-500 italic">Escribiendo...</div>

            <form id="chat-form" class="p-4 bg-slate-800/50 border-t border-slate-700 flex gap-2">
                <input type="text" id="user-input" placeholder="Escribe aquí..." class="flex-1 bg-black border border-slate-700 rounded-full px-4 py-2 text-sm focus:outline-none">
                <button type="submit" class="bg-purple-600 p-2 rounded-full">
                    <svg class="w-5 h-5 fill-white" viewBox="0 0 24 24"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/></svg>
                </button>
            </form>
        </div>
    </section>

    <footer class="text-center py-10">
        <button type="button" onclick="toggleModal('privacy-modal')" class="text-xs text-slate-500 underline">Política de Privacidad</button>
    </footer>

    <div id="auth-modal" class="fixed inset-0 z-[100] hidden items-center justify-center p-4 bg-black/80">
        <div class="bg-slate-900 border border-slate-800 w-full max-w-sm rounded-3xl p-8 text-center">
            <h2 class="text-white font-bold mb-6">Inicia Sesión</h2>
            <button onclick="loginGoogle()" class="w-full py-3 bg-white text-black rounded-xl font-bold mb-3">Google</button>
            <button onclick="loginAnonimo()" class="w-full py-3 bg-slate-800 text-white rounded-xl font-bold">Anónimo</button>
            <button onclick="toggleModal('auth-modal')" class="mt-4 text-xs text-slate-500">CERRAR</button>
        </div>
    </div>

    <div id="privacy-modal" class="fixed inset-0 z-[110] hidden items-center justify-center p-4 bg-black/90">
        <div class="bg-slate-900 border border-slate-800 w-full max-w-2xl rounded-3xl p-8">
            <h2 class="text-xl font-bold text-purple-400 mb-4">Privacidad</h2>
            <p class="text-sm text-slate-400">Tus datos están seguros y tus chats son privados.</p>
            <button onclick="toggleModal('privacy-modal')" class="mt-6 bg-purple-600 px-6 py-2 rounded-full">Cerrar</button>
        </div>
    </div>

    <script>
        // CONFIGURACIÓN DE TU DASHBOARD
        const SUPABASE_URL = 'https://wxstdwmoppdzojwmzvge.supabase.co';
        const SUPABASE_KEY = 'TU_LLAVE_ANON_AQUI'; // Saca el valor de tu captura
        const supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        // FUNCIÓN DE MODALES MEJORADA
        function toggleModal(id) {
            const modal = document.getElementById(id);
            if (modal.classList.contains('hidden')) {
                modal.classList.remove('hidden');
                modal.classList.add('flex-modal');
            } else {
                modal.classList.remove('flex-modal');
                modal.classList.add('hidden');
            }
        }

        // CHAT SIN REINICIO
        const form = document.getElementById('chat-form');
        form.addEventListener('submit', async (e) => {
            e.preventDefault(); // ESTO EVITA QUE LA PÁGINA SE REINICIE
            
            const input = document.getElementById('user-input');
            const chatBox = document.getElementById('chat-box');
            const typing = document.getElementById('typing');
            const mensaje = input.value.trim();

            if (!mensaje) return;

            // Mostrar mensaje usuario
            chatBox.innerHTML += `<div class="bg-purple-600 p-3 rounded-xl ml-auto max-w-[80%] text-sm">${mensaje}</div>`;
            input.value = '';
            typing.classList.remove('hidden');

            try {
                // Llamada a DeepSeek (con saldo exitoso)
                const { data, error } = await supabase.functions.invoke('chat-expert', {
                    body: { message: mensaje }
                });

                typing.classList.add('hidden');

                if (data) {
                    chatBox.innerHTML += `<div class="bg-slate-800 p-3 rounded-xl max-w-[80%] text-sm">${data.reply}</div>`;
                }
            } catch (err) {
                typing.classList.add('hidden');
                console.error(err);
            }
            chatBox.scrollTop = chatBox.scrollHeight;
        });

        async function loginGoogle() { /* ... igual ... */ }
        async function loginAnonimo() { /* ... igual ... */ }
    </script>
</body>
</html>
